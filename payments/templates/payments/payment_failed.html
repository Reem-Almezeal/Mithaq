{% extends "base.html" %}

{% block title %}لم تتم عملية الدفع — ميثاق{% endblock %}

{% block content %}
<section class="min-h-screen bg-brand-bg flex items-center justify-center px-4 py-16">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-10 text-center">

    <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-brand-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-black mb-3">لم تتم عملية الدفع</h1>
    <p class="text-gray-500 mb-8">
      يرجى المحاولة مرة أخرى. إذا استمرت المشكلة، تحقق من بيانات البطاقة أو تواصل مع البنك.
    </p>

    <div class="space-y-3">
      <a href="/api/subscriptions/plans/"
         class="inline-flex items-center gap-2 w-full justify-center
                px-6 py-3 rounded-xl text-sm font-bold text-white
                bg-brand-gold hover:bg-brand-gold-dark active:scale-95 transition-all duration-150">
        حاول مرة أخرى
      </a>
      <a href="/dashboard/"
         class="inline-flex items-center gap-2 w-full justify-center
                px-6 py-3 rounded-xl text-sm font-bold text-black
                border-2 border-black hover:bg-black hover:text-white
                active:scale-95 transition-all duration-150">
        العودة للوحة التحكم
      </a>
    </div>

  </div>
</section>
{% endblock %}
