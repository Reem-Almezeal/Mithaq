{% extends "core/dashboard_base.html" %}
{% load static %}

{% block content %}
<style>
  :root {
    --navy:#1B2A4A; --gold:#C9A84C; --gold-light:#E8C97A;
    --off-white:#F8F7F4; --border:#E5E7EB;
    --text-dark:#1C1C1C; --text-grey:#6B7280;
    --error:#C0392B; --error-bg:#FEE2E2;
  }
  @keyframes shake {
    0%, 100% { transform:translateX(0); }
    20%      { transform:translateX(-8px) rotate(-2deg); }
    40%      { transform:translateX(8px) rotate(2deg); }
    60%      { transform:translateX(-5px); }
    80%      { transform:translateX(5px); }
  }
  .error-icon { animation:shake .55s ease-in-out forwards; transform-origin:center; }
  .btn-gold    { background:var(--gold); color:var(--navy); border-radius:8px; padding:12px 24px; font-weight:800; font-size:15px; border:none; cursor:pointer; transition:opacity .15s; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
  .btn-gold:hover { opacity:.88; }
  .btn-outlined{ background:#fff; border:2px solid var(--navy); color:var(--navy); border-radius:8px; padding:12px 24px; font-weight:800; font-size:15px; cursor:pointer; transition:background .15s; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
  .btn-outlined:hover { background:var(--navy); color:#fff; }
  .reason-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; font-size:14px; color:#7F1D1D; }
</style>

<div style="display:flex; justify-content:center; padding:20px 0;">
  <div style="width:100%; max-width:560px;">

    <div style="background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:48px 36px; text-align:center;">

      <!-- Animated X -->
      <div class="error-icon" style="width:80px; height:80px; border-radius:50%; background:var(--error-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
        <svg width="40" height="40" fill="none" stroke="var(--error)" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>

      <h1 style="font-size:26px; font-weight:800; color:var(--navy); margin:0 0 8px;">
        لم تتم عملية الدفع
      </h1>
      <p style="font-size:15px; color:var(--text-grey); margin:0 0 32px;">
        لم يتم خصم أي مبلغ من حسابك
      </p>

      <!-- Reasons card -->
      <div style="background:var(--error-bg); border-radius:10px; padding:20px 24px; margin-bottom:32px; text-align:right;">
        <p style="font-size:14px; font-weight:700; color:#7F1D1D; margin:0 0 14px;">أسباب محتملة:</p>
        <div class="reason-item">
          <svg width="16" height="16" fill="none" stroke="var(--error)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:1px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
          تأكد من صحة بيانات البطاقة
        </div>
        <div class="reason-item">
          <svg width="16" height="16" fill="none" stroke="var(--error)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:1px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
          تأكد من وجود رصيد كافٍ
        </div>
        <div class="reason-item">
          <svg width="16" height="16" fill="none" stroke="var(--error)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0; margin-top:1px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
          تواصل مع البنك إذا استمرت المشكلة
        </div>
      </div>

      <!-- Action buttons -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
        <a href="/api/subscriptions/checkout-page/{{ plan_id }}/" class="btn-gold">
          حاول مرة أخرى
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <a href="/support/" class="btn-outlined">
          تواصل مع الدعم
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
