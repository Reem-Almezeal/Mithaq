{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميثاق — إنشاء حساب</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-body">

    <div class="auth-wrapper">

        <!-- Sidebar -->
        <div class="auth-sidebar">
            <div class="auth-logo">
                <span>Mithaq</span>
                <svg viewBox="0 0 16 16" width="16" height="16" fill="none">
                    <polygon points="8,1 15,8 8,15 1,8" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
            <div class="auth-watermark">
                <svg viewBox="0 0 60 60" width="60" height="60" fill="none">
                    <polygon points="30,5 55,30 30,55 5,30" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3"/>
                    <polygon points="30,12 48,30 30,48 12,30" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.2"/>
                </svg>
            </div>
        </div>

        <!-- Form -->
        <div class="auth-form-side">

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {{ message.extra_tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <h1 class="auth-title">إنشاء حساب جديد</h1>
            <p class="auth-subtitle">Create a new account</p>

            <form method="POST" action="{% url 'accounts:sign_up' %}">
                {% csrf_token %}

                <!-- Name Row -->
                <div class="auth-row">
                    <div class="auth-field">
                        <i class="bi bi-person auth-field-icon"></i>
                        <input type="text" name="first_name" placeholder="الاسم الأول" required>
                    </div>
                    <div class="auth-field">
                        <i class="bi bi-person auth-field-icon"></i>
                        <input type="text" name="last_name" placeholder="اسم العائلة" required>
                    </div>
                </div>

                <div class="auth-field">
                    <i class="bi bi-envelope auth-field-icon"></i>
                    <input type="email" name="email" placeholder="البريد الإلكتروني" required>
                </div>

                <div class="auth-field">
                    <i class="bi bi-card-text auth-field-icon"></i>
                    <input type="text" name="national_id" placeholder="رقم الهوية / الإقامة" required>
                </div>

                <div class="auth-field">
                    <i class="bi bi-phone auth-field-icon"></i>
                    <input type="text" name="mobile" placeholder="رقم الجوال" required>
                </div>

                <div class="auth-field">
                    <i class="bi bi-calendar auth-field-icon"></i>
                    <input type="date" name="date_of_birth" placeholder="تاريخ الميلاد">
                </div>

                <div class="auth-field">
                    <i class="bi bi-lock auth-field-icon"></i>
                    <input type="password" name="password" placeholder="كلمة المرور" required>
                </div>

                <div class="auth-field">
                    <i class="bi bi-lock-fill auth-field-icon"></i>
                    <input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور" required>
                </div>

                <button type="submit" class="auth-btn">إنشاء حساب</button>

            </form>

            <p class="auth-bottom-link">
                تملك حساباً؟
                <a href="{% url 'accounts:sign_in' %}">تسجيل الدخول</a>
            </p>

        </div>

    </div>

</body>
</html>
